# ========================================
# Cremy Docs - Nginx Configuration
# ========================================

# Run as non-root user
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ========================================
    # Basic Settings
    # ========================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ========================================
    # Rate Limiting Zones
    # ========================================
    # API endpoints: 100 requests per minute
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # Auth endpoints: 5 requests per minute (stricter)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # General: 200 requests per minute
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/m;

    # ========================================
    # Connection Limiting
    # ========================================
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ========================================
    # Gzip Compression
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/css
        text/javascript
        text/plain
        text/xml
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ========================================
    # Upstream (Backend Application)
    # ========================================
    upstream app_backend {
        least_conn;
        server app:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ========================================
    # Security Headers
    # ========================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ========================================
    # Server Configuration
    # ========================================
    server {
        listen 80;
        server_name localhost;

        # Security headers (HTTP)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Rate limiting - General
        limit_req zone=general_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        # Health check endpoint (no rate limit)
        location /api/health {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # No rate limiting on health check
            limit_req zone=general_limit nodelay;
        }

        # Auth endpoints - Stricter rate limiting
        location ~ ^/api/auth {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Auth specific headers
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # API endpoints - Standard rate limiting
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 15;

            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts for API
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static files - Next.js (Cached)
        location /_next/static {
            proxy_pass http://app_backend;
            proxy_cache_valid 200 60m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_404 http_500;
            add_header Cache-Control "public, max-age=31536000, immutable";
            
            # No rate limiting on static files
            limit_req zone=general_limit nodelay;
        }

        # Public static files
        location /static {
            proxy_pass http://app_backend;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # WebSocket support
        location /ws {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Main application - Everything else
        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Redirect HTTP to HTTPS (for production)
        # Uncomment when SSL certificates are configured
        # return 301 https://$server_name$request_uri;

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ========================================
    # HTTPS Server (Production with SSL)
    # ========================================
    # Uncomment and configure when SSL certificates are available
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost;
    #
    #     # SSL Configuration
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:50m;
    #     ssl_session_tickets off;
    #
    #     # Modern SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS (Uncomment to enable)
    #     # add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Security headers (HTTPS)
    #     add_header X-Frame-Options "DENY" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #
    #     # Copy all location blocks from HTTP server above
    #     # (they will work the same way for HTTPS)
    # }

}