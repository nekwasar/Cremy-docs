# ========================================
# Base Infrastructure Services
# ========================================
# Use with a dev/prod overlay to add the app service:
#   dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # ========================================
  # Nginx Reverse Proxy
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: cremy-docs-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-run:/var/run
    networks:
      - cremy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # MongoDB Database
  # ========================================
  mongo:
    image: mongo:7.0
    container_name: cremy-docs-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: cremy-docs
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-devpassword}
    expose:
      - "27017"
    ports:
      - "${MONGO_PORT:-27017}:27017"
    networks:
      - cremy-network
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' -u $${MONGO_INITDB_ROOT_USERNAME} -p $${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # Redis Cache & Session Store
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: cremy-docs-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devpassword}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    expose:
      - "6379"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - cremy-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ========================================
# Networks
# ========================================
networks:
  cremy-network:
    driver: bridge

# ========================================
# Persistent Volumes
# ========================================
volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local
  nginx-run:
    driver: local
