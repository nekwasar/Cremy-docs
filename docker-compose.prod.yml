# ========================================
# Production Overlay — Optimized Build, Security Hardening
# ========================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   or:  npm run prod:docker

services:
  # ========================================
  # Nginx — add app dependency
  # ========================================
  nginx:
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================
  # Application — Production Mode
  # ========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: cremy-docs-app
    restart: unless-stopped
    init: true
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_APP_USER:-cremy-app}:${MONGO_APP_PASSWORD:-devpassword}@mongo:27017/cremy-docs?authSource=cremy-docs
      REDIS_URL: redis://:${REDIS_PASSWORD:-devpassword}@redis:6379
    env_file:
      - .env.secrets
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cremy-network
    read_only: true
    tmpfs:
      - /tmp:exec
      - /app/.next/cache:noexec
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
