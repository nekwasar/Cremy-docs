name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (strict - zero warnings)
        run: npm run lint -- --max-warnings 0

      - name: Run TypeScript type check
        run: npm run type-check

  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Wait for MongoDB to be ready
        run: |
          echo "Waiting for MongoDB on port 27017..."
          for i in $(seq 1 30); do
            if nc -z localhost 27017 2>/dev/null; then
              echo "MongoDB is reachable on port 27017"
              break
            fi
            echo "Attempt $i/30: MongoDB not ready, retrying in 2s..."
            sleep 2
          done
          echo "=== MONGO LOGS ==="
          docker logs $(docker ps -q --filter ancestor=mongo:6.0 | head -1) 2>/dev/null || echo "Cannot retrieve logs"

      - name: Wait for Redis to be ready
        run: |
          echo "Waiting for Redis on port 6379..."
          for i in $(seq 1 20); do
            if redis-cli -h localhost ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            echo "Attempt $i/20: Redis not ready, retrying in 2s..."
            sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/cremy-docs
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          NODE_ENV: test

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (production target)
        run: docker build --target production -t cremy-docs:${{ github.sha }} .

      - name: Build Docker Compose
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build
